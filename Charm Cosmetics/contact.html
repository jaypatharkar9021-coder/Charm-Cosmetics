<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>

body{
font-family:Poppins;
margin:0;
background:#fff;
}

header{
background:#ff4d6d;
color:white;
padding:15px;
text-align:center;
}

.contact-container{
max-width:600px;
margin:40px auto;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
border-radius:10px;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:12px;
border-radius:5px;
cursor:pointer;
width:100%;
}

button:hover{
background:#ff1f4b;
}

footer{
text-align:center;
padding:20px;
margin-top:30px;
background:#f5f5f5;
}

</style>
</head>

<body>

<header>
<h1>Contact Us</h1>
<p>We would love to hear from you</p>
</header>

<div class="contact-container">

<form>
<label>Name</label>
<input type="text" placeholder="Enter your name">

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Message</label>
<textarea rows="5" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>

</form>

</div>

<footer>
© 2025 Beauty Products Website
</footer>

</body>
</html>
